<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0fdf4; display: flex; align-items: center; min-height: 100vh; }

            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            max-width: 520px;
            margin: 0 auto;
        }
        .success-icon {
            font-size: 4rem;
            color: #22c55e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-card">
            <div class="success-icon">&#10003;</div>
            <h2 class="fw-bold mt-3">Payment Successful!</h2>
            <p class="text-muted">Thank you for your order. We'll be in touch within 24 hours to start working on your fixes.</p>
            <hr>
            <p class="small text-muted mb-0">A confirmation email is on its way.</p>
            <a href="/" class="btn btn-outline-primary mt-4">Audit Another Site</a>
